<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacific Yacht Partners</title>
  <meta name="description" content="One firm. One relationship. For life. San Diego · Newport Beach.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #18242f;
      overflow: hidden;
      cursor: crosshair;
    }

    /* ── WATER ── */
    #water-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(
        ellipse 70% 65% at 50% 48%,
        rgba(18,28,40,0.0) 0%,
        rgba(18,28,40,0.25) 55%,
        rgba(12,20,32,0.72) 100%
      );
    }

    .center-glow {
      position: fixed;
      left: 50%; top: 38%;
      transform: translate(-50%, -50%);
      width: 640px; height: 680px;
      background: radial-gradient(ellipse at center, rgba(52,78,108,0.75) 0%, rgba(38,58,82,0.4) 45%, transparent 72%);
      pointer-events: none;
      border-radius: 50%;
    }

    /* ── CENTER COMPOSITION ── */
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      gap: 0;
    }

    .burgee {
      width: min(300px, 38vw);
      height: auto;
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      transition: opacity 1.0s cubic-bezier(0.22,1,0.36,1),
                  transform 1.0s cubic-bezier(0.22,1,0.36,1);
    }
    .burgee.on { opacity: 1; transform: none; }

    .name {
      margin-top: 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(18px, 2.6vw, 32px);
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .name.on { opacity: 1; transform: none; }

    .rule {
      width: 0; height: 1px;
      background: #c0192b;
      margin: 26px auto 28px;
      transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .rule.on { width: 72px; }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(44px, 6.8vw, 96px);
      font-weight: 600;
      line-height: 1.0;
      text-align: center;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .tagline em {
      font-style: italic;
      color: rgba(255,255,255,0.42);
      font-weight: 300;
    }
    .tagline.on { opacity: 1; transform: none; }

    .services-wrap {
      margin-top: 28px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .services-wrap.on { opacity: 1; }
    .services-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
    }
    .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(192,25,43,0.7); flex-shrink: 0;
    }

    .foot-stack {
      margin-top: 28px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.48);
      opacity: 0; transition: opacity 0.8s ease;
      pointer-events: auto;
    }
    .foot-stack.on { opacity: 1; }
    .foot-stack a {
      color: rgba(255,255,255,0.58); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.22); padding-bottom: 1px;
      transition: color 0.25s, border-color 0.25s;
    }
    .foot-stack a:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.5); }

    /* ── SIGNUP BAR ── */
    .signup-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 14px 28px 20px;
      background: linear-gradient(to top, rgba(8,14,22,0.97) 0%, rgba(10,17,26,0.88) 100%);
      border-top: 1px solid rgba(255,255,255,0.06);
      gap: 10px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: auto;
      cursor: auto;
    }
    .signup-bar.on { opacity: 1; transform: none; }

    .signup-bar-label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(15px, 1.6vw, 20px);
      font-style: italic; font-weight: 300;
      letter-spacing: 0.03em;
      color: rgba(255,255,255,0.72);
      text-align: center;
    }

    .signup-bar-row {
      display: flex; align-items: center; gap: 16px;
    }

    .signup-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 400;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .signup-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    .signup-input {
      background: transparent; border: none; outline: none;
      border-bottom: 1px solid rgba(255,255,255,0.28);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 300;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.92);
      padding: 6px 0;
      width: 220px;
      caret-color: #c0192b;
      cursor: text;
      transition: border-color 0.2s;
    }
    .signup-input:focus { border-color: rgba(255,255,255,0.55); }
    .signup-input::placeholder {
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .signup-btn {
      background: #c0192b; border: none; outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.34em; text-transform: uppercase;
      color: #fff;
      padding: 11px 24px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }
    .signup-btn:hover:not(:disabled) { background: #a81626; }
    .signup-btn:disabled { opacity: 0.4; cursor: default; }

    .signup-confirm-text {
      display: none;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px; font-style: italic; font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.03em;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(8,13,20,0.80);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor: auto;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal-card {
      background: #2a3f52;
      border: 1px solid rgba(255,255,255,0.18);
      width: 100%; max-width: 480px;
      padding: 48px 44px 40px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .modal-overlay.open .modal-card { transform: none; }

    .modal-rule {
      width: 30px; height: 1px;
      background: rgba(192,25,43,0.55);
      margin-bottom: 26px;
    }

    .modal-heading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 600;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 300;
      letter-spacing: 0.26em; text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 36px;
    }

    .modal-field {
      width: 100%;
      border: none; border-bottom: 1px solid rgba(255,255,255,0.35);
      background: transparent; outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 300;
      letter-spacing: 0.12em;
      color: #fff;
      padding: 10px 0; margin-bottom: 28px;
      caret-color: #c0192b;
      transition: border-color 0.2s;
      cursor: text;
    }
    .modal-field:focus { border-color: rgba(255,255,255,0.7); }
    .modal-field::placeholder {
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.22em;
      font-size: 13px;
      text-transform: uppercase;
    }

    .modal-label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 13px;
    }

    .modal-name-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-bottom: 0;
    }
    .modal-name-row .modal-field { margin-bottom: 28px; }

    .interest-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 24px;
    }

    .interest-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      padding: 12px 10px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      text-align: center;
    }
    .interest-btn:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
    .interest-btn.sel {
      background: rgba(192,25,43,0.2);
      border-color: rgba(192,25,43,0.7);
      color: #fff;
    }

    .modal-actions {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      margin-top: 16px;
    }

    .modal-skip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      background: none; border: none; cursor: pointer;
      transition: color 0.2s;
    }
    .modal-skip:hover { color: #fff; }

    .modal-submit {
      background: #c0192b; border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.36em; text-transform: uppercase;
      color: #fff;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-submit:hover { background: #a81626; }

    .modal-close {
      position: absolute; top: 18px; right: 20px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.38);
      font-size: 20px; line-height: 1;
      transition: color 0.2s; padding: 4px;
    }
    .modal-close:hover { color: rgba(255,255,255,0.65); }

    @media (max-width: 600px) {
      .burgee { width: 56vw; }
      .signup-label, .signup-divider { display: none; }
      .signup-input { width: 160px; }
      .modal-card { padding: 36px 26px 32px; }
      .interest-grid { grid-template-columns: 1fr; }
      .modal-name-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

<canvas id="water-canvas"></canvas>
<div class="vignette"></div>
<div class="center-glow"></div>

<div class="stage">
  <img class="burgee" id="burg" src="PYP Logo Only.png" alt="PYP">
  <div class="name" id="name">Pacific Yacht Partners</div>
  <div class="rule" id="rule"></div>
  <div class="tagline" id="tagline">
    One firm.<br>One relationship.<br><em>Your yachting lifestyle.</em>
  </div>
  <div class="services-wrap" id="svc">
    <div class="services-row">
      <span>Sail</span><span class="dot"></span><span>Power</span>
    </div>
    <div class="services-row">
      <span>New Boats</span><span class="dot"></span><span>Brokerage</span><span class="dot"></span><span>Marine Services</span>
    </div>
  </div>
  <div class="foot-stack" id="fl">
    <div>Newport Beach &nbsp;·&nbsp; San Diego</div>
    <div><a href="mailto:Info@pacificyp.com">Info@pacificyp.com</a></div>
  </div>
</div>

<!-- ── SIGNUP BAR ── -->
<div class="signup-bar" id="signup-bar">
  <div class="signup-bar-label">Something's coming. Be the first to know.</div>
  <div class="signup-bar-row">
  <input
    class="signup-input"
    id="signup-input"
    type="email"
    placeholder="Your email address"
    autocomplete="email"
  >
  <button class="signup-btn" id="signup-btn" onclick="handleSignup()">Sign Up</button>
  <div class="signup-confirm-text" id="signup-confirm">You're on the list.</div>
  </div>
</div>

<!-- ── OPTIONAL INFO MODAL ── -->
<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-rule"></div>
    <h3 class="modal-heading">Tell us a little more.</h3>
    <p class="modal-sub">Optional — takes thirty seconds.</p>

    <div class="modal-name-row">
      <input class="modal-field" id="modal-firstname" type="text" placeholder="First name">
      <input class="modal-field" id="modal-lastname" type="text" placeholder="Last name">
    </div>

    <label class="modal-label">Sail or power?</label>
    <div class="interest-grid" id="grid-type">
      <button class="interest-btn exclusive" data-group="type" onclick="toggleExclusive(this)">Sail</button>
      <button class="interest-btn exclusive" data-group="type" onclick="toggleExclusive(this)">Power</button>
    </div>

    <label class="modal-label">New boat or brokerage?</label>
    <div class="interest-grid" id="grid-market">
      <button class="interest-btn exclusive" data-group="market" onclick="toggleExclusive(this)">New Boat</button>
      <button class="interest-btn exclusive" data-group="market" onclick="toggleExclusive(this)">Brokerage</button>
    </div>

    <label class="modal-label">Where are you in the process?</label>
    <div class="interest-grid" id="grid-stage">
      <button class="interest-btn exclusive" data-group="stage" onclick="toggleExclusive(this)">Just Interested</button>
      <button class="interest-btn exclusive" data-group="stage" onclick="toggleExclusive(this)">Just Starting</button>
      <button class="interest-btn exclusive" data-group="stage" onclick="toggleExclusive(this)">Actively Looking</button>
      <button class="interest-btn exclusive" data-group="stage" onclick="toggleExclusive(this)">Ready to Buy</button>
      <button class="interest-btn exclusive" data-group="stage" onclick="toggleExclusive(this)">Current Owner</button>
    </div>

    <div class="modal-actions">
      <button class="modal-skip" onclick="closeModal()">Skip — I'm done</button>
      <button class="modal-submit" onclick="handleModalSubmit()">Send It</button>
    </div>
  </div>
</div>

<script>
// ── HUBSPOT CONFIG ──
// Replace before going live.
// Portal ID:  HubSpot Settings > Account Setup > Account Defaults
// Form GUID:  Marketing > Forms > open your form > copy UUID from the URL
const HS_PORTAL_ID = '245917969';
const HS_FORM_GUID = '5ef39dd0-ba5a-4af0-b390-42f8defd0d22';

// ── WATER RIPPLE SIMULATION ──
(function() {
  const canvas = document.getElementById('water-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, cols, rows, buf0, buf1;
  const CELL = 4, DAMP = 0.984;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    cols = Math.ceil(W/CELL) + 2;
    rows = Math.ceil(H/CELL) + 2;
    buf0 = new Float32Array(cols * rows);
    buf1 = new Float32Array(cols * rows);
  }

  function idx(x, y) { return y * cols + x; }

  function disturb(px, py, str) {
    const cx = Math.floor(px/CELL), cy = Math.floor(py/CELL), r = 5;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d <= r) {
          const nx = cx+dx, ny = cy+dy;
          if (nx>0 && nx<cols-1 && ny>0 && ny<rows-1)
            buf0[idx(nx,ny)] += str * (1 - d/r);
        }
      }
    }
  }

  function step() {
    for (let y = 1; y < rows-1; y++) {
      for (let x = 1; x < cols-1; x++) {
        const i = idx(x,y);
        const v = (buf0[idx(x-1,y)] + buf0[idx(x+1,y)] + buf0[idx(x,y-1)] + buf0[idx(x,y+1)]) * 0.5 - buf1[i];
        buf1[i] = v * DAMP;
      }
    }
    const t = buf0; buf0 = buf1; buf1 = t;
  }

  function draw() {
    const img = ctx.createImageData(W, H);
    const d = img.data;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const cx = Math.floor(x/CELL)+1, cy = Math.floor(y/CELL)+1;
        const dX = buf0[idx(cx+1,cy)] - buf0[idx(cx-1,cy)];
        const wave = buf0[idx(cx,cy)];
        const depth = y / H;
        const bright = Math.max(0, Math.min(1, wave * 0.12 + 0.05));
        const rr = Math.max(0,Math.min(255, 24 + depth*28 + bright*72  + dX*6));
        const gg = Math.max(0,Math.min(255, 36 + depth*42 + bright*88  + dX*5));
        const bb = Math.max(0,Math.min(255, 58 + depth*70 + bright*108 + dX*3));
        const pi = (y*W+x)*4;
        d[pi]=rr; d[pi+1]=gg; d[pi+2]=bb; d[pi+3]=255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  function loop() { step(); draw(); requestAnimationFrame(loop); }

  window.disturb = disturb;
  window.addEventListener('resize', resize);
  resize(); loop();
})();

// ── ENTRANCE SEQUENCE ──
const seq = [
  ['burg',       100],
  ['name',       500],
  ['rule',       850],
  ['tagline',   1150],
  ['svc',       1700],
  ['fl',        2100],
  ['signup-bar',  2500],
];
seq.forEach(([id, delay]) => {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.classList.add('on');
    if (id === 'tagline') {
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      window.disturb(cx, cy, 22);
      setTimeout(() => window.disturb(cx - 80, cy + 40, 14), 80);
      setTimeout(() => window.disturb(cx + 60, cy - 30, 14), 140);
    }
  }, delay);
});

// ── SUBMIT ──
let capturedEmail = '';

async function handleSignup() {
  const input = document.getElementById('signup-input');
  const btn   = document.getElementById('signup-btn');
  const email = input.value.trim();

  if (!email || !email.includes('@') || !email.includes('.')) {
    input.style.borderBottomColor = 'rgba(192,25,43,0.7)';
    setTimeout(() => input.style.borderBottomColor = '', 1200);
    return;
  }

  btn.disabled = true;
  btn.textContent = '...';
  capturedEmail = email;

  await submitToHubspot({ email });

  input.style.display = 'none';
  btn.style.display = 'none';
  document.getElementById('signup-confirm').style.display = 'block';

  setTimeout(() => openModal(), 600);
}

async function submitToHubspot(fields) {
  if (HS_PORTAL_ID === 'YOUR_PORTAL_ID') {
    console.log('HubSpot not configured. Would submit:', fields);
    return;
  }
  const payload = {
    fields: Object.entries(fields)
      .filter(([, v]) => v)
      .map(([name, value]) => ({ objectTypeId: '0-1', name, value })),
    context: { pageUri: window.location.href, pageName: 'Pacific Yacht Partners' }
  };
  try {
    await fetch(
      `https://api.hsforms.com/submissions/v3/integration/submit/${HS_PORTAL_ID}/${HS_FORM_GUID}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
    );
  } catch (e) {
    console.warn('HubSpot error:', e);
  }
}

// ── MODAL ──
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function toggleInterest(btn) { btn.classList.toggle('sel'); }

function toggleExclusive(btn) {
  document.querySelectorAll(`.interest-btn[data-group="${btn.dataset.group}"]`)
    .forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function handleModalSubmit() {
  const firstname = document.getElementById('modal-firstname').value.trim();
  const lastname  = document.getElementById('modal-lastname').value.trim();
  const type      = document.querySelector('.interest-btn[data-group="type"].sel')?.textContent || '';
  const market    = document.querySelector('.interest-btn[data-group="market"].sel')?.textContent || '';
  const stage     = document.querySelector('.interest-btn[data-group="stage"].sel')?.textContent || '';

  if (capturedEmail) {
    await submitToHubspot({
      email:     capturedEmail,
      firstname: firstname,
      lastname:  lastname,
      sign_up_notes: [type, market, stage].filter(Boolean).join(' · ')
    });
  }
  closeModal();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
